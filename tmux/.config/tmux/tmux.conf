unbind r
bind r source-file ~/.config/tmux/tmux.conf

set-option -g default-terminal 'screen-254color'
set-option -g terminal-overrides ',xterm-256color:RGB'
set -g default-terminal "${TERM}"

set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 10000       # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on
set -g mouse on

# Pi specific config
set -g extended-keys on
set -g extended-keys-format csi-u

set -g status-left "#[fg=#89b4fa,bg=default]#[fg=#1e1e2e,bold,bg=#89b4fa] #S#[fg=#89b4fa,bg=default] "
set -g status-right "#[fg=#89b4fa,bg=default]  #[fg=#cdd6f4]#{cpu_percentage} #[fg=#89b4fa,bg=default]  #[fg=#cdd6f4]#{ram_percentage} "

set -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W"
set -g window-status-format "#[fg=#a6adc8]  #I:#W"

set -g status-justify left
set -g status-left-length 200
set -g status-right-length 200
set -g status-position top
set -g status-style 'bg=default'

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key -n C-p previous-window
bind-key -n C-n next-window

bind s split-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Session persistence: save & restore tmux state
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Save every 15 minutes, restore last saved session on start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Resurrect: also restore pane contents and neovim sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

run '~/.config/tmux/plugins/tpm/tpm'
